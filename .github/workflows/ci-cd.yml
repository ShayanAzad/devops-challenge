name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd-pipeline:
    name: Build, Test, and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest httpx

      - name: Lint Code (CI)
        run: ruff check .

      - name: Run Tests (CI)
        run: pytest tests/ -v --tb=short
        # If there are no tests yet, don't fail the whole pipeline
        continue-on-error: true

      - name: Verify Docker Build (CI)
        run: docker compose build

      - name: Simulated Deployment (CD)
        # Instead of deploying to a real external server (which requires SSH keys/secrets),
        # we start the infrastructure right here on the GitHub runner to prove it works.
        run: |
          docker compose up -d
          docker compose ps
