name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-cd-pipeline:
    name: Build, Deploy, and Load Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint Code (CI)
        run: ruff check .

      - name: Build & Start Infrastructure (CD)
        run: |
          docker compose up -d --build
          # Wait a few seconds for FastAPI and Redis to be fully ready
          sleep 10
          docker compose ps

      - name: Run k6 Performance Test (CI)
        run: |
          docker run --rm -i --network host -e BASE_URL=http://app:8000 grafana/k6 run - < tests/load_test.js
